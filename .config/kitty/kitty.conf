### Includes

## Color scheme
include ./themes/RosePine.conf

## Keybindings
include ./keybindings.conf

### Style

## Window
remember_window_size  yes
initial_window_width  900
initial_window_height 900

# background_opacity 0.9
window_border_width 0.5pt
window_padding_width 10
hide_window_decorations yes
titlebar-only yes
wayland_titlebar_color system

## Tab Bar
tab_bar_edge top
tab_bar_background none
tab_bar_style separator
tab_separator " "
tab_bar_align center
tab_powerline_style round
tab_activity_symbol " "
tab_title_template " {fmt.fg.tab}{bell_symbol}{activity_symbol} {fmt.fg.tab}{index}:{tab.active_exe}"
active_tab_font_style bold-italic

## Font
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 16.0
disable_ligatures never

### Layout
enabled_layouts splits

### Bell
enable_audio_bell no
visual_bell_duration 2.0 linear

### URL
url_style curly
open_url_with default
url_prefixes file ftp ftps gemini git gopher http https irc ircs kitty mailto news sftp ssh
detect_urls yes
allow_hyperlinks yes
map ctrl+shift+u open_url_with_hints
